<!-- Give your form a name  -->
<form name="TPP">
	<!-- Specify the sheet that you want to store the submissions in -->
	<input type="hidden" name="TPP" value="TPP" />
	<!-- If this hidden input is not present, it defaults to 'Sheet1' -->

	<input name="email" type="email" placeholder="Email" required />
	<button type="submit">Send</button>
</form>

<script>
	const scriptURL = 'https://script.google.com/macros/s/AKfycbyhLt4IBZcN09et4dFdrsCOQ8eofPGeZTyaQAQnq6XcqT8GsTKZG22H99DVeY7_0GCPQg/exec'
	const form = document.forms['TPP']

	form.addEventListener('submit', e => {
		e.preventDefault()
		fetch(scriptURL, { method: 'POST', body: new FormData(form) })
			.then(response => response.json())
			.then(response => console.log('Success!', response))
			.catch(error => console.error('Error!', error.message))
	})
</script>
