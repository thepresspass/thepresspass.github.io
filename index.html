<!-- Give your form a name  -->
<form name="The Press Pass">
	<!-- Specify the sheet that you want to store the submissions in -->
	<input type="hidden" name="sheet_name" value="YOUR_SHEET_NAME" />
	<!-- If this hidden input is not present, it defaults to 'Sheet1' -->

	<input name="email" type="email" placeholder="Email" required />
	<button type="submit">Send</button>
</form>

<script>
	const scriptURL = 'https://script.google.com/macros/s/AKfycbyNMLQ4CX8QD3B7eNvz4wn7ZsVi3Jcdxh31RWhyM_wA2ojbQlKfkg76k5oouL4PUsHFbA/exec'
	const form = document.forms['The Press Pass']

	form.addEventListener('submit', e => {
		e.preventDefault()
		fetch(scriptURL, { method: 'POST', body: new FormData(form) })
			.then(response => response.json())
			.then(response => console.log('Success!', response))
			.catch(error => console.error('Error!', error.message))
	})
</script>
